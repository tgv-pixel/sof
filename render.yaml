services:
  - type: web
    name: auto-add-server
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers=1 --threads=2 --timeout=120 --bind=0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: GITHUB_TOKEN
        sync: false
    healthCheckPath: /ping
    autoDeploy: true
